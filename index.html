<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyle & Lyn RSVP</title>
    <style>
        @font-face {
            font-family: 'GreatVibes';
            src: url('fonts/GreatVibes-Regular.ttf') format('truetype');
        }
        @media (orientation: landscape) {
            body {
                overflow: hidden; /* Prevents unwanted scrollbars */
            }

            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
            }


            .game {
                position: absolute;
                bottom: 0%;
                left: 50%;
                transform: translateX(-50%);
                background-color: #FFFFFF;
                padding: 0;
                margin: 0;
                margin-left: 20%;
                margin-bottom: 1%;
                border: none;
                width: 50%;
                aspect-ratio: 16/9;
                z-index:-1;
            }

            .background-container {
                position: absolute;
                top: 5%;
                background-image: url('images/kylelyn.png');
                background-position: left center;
                background-size: contain;
                background-repeat: no-repeat;
                width: 100%;
                height: 100vh;
                margin: 0;
                margin-left: 5%;
                z-index: -1;
            }

            #invitedtext {
                font-family: 'GreatVibes', 'Brush Script MT';
                top: 10%;
                text-align: left;
                width: 50%;
                margin-inline: auto;
                font-size: 6vh;
                font-weight: bold;
                margin-bottom: 0%;
                margin-top: 0.5%;
                margin-left: 17.5%;
            }

            #rsvp-details {
                position: absolute;
                width: 50vw;
                margin: 0 auto;
                margin-top: -20vh;
                margin-left: 75%;
                z-index: 100;
            }

            #weddingdetails
            {
                margin-top: -1%;
                width: 25%;
                margin-left: 45%;
                font-size: 24px;
            }
        }

        @media (orientation: portrait) {
            body {
                font-family: 'GreatVibes';
                overflow: hidden; /* Prevents unwanted scrollbars */
            }

            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
            }

            .game {
                position: absolute;
                bottom: 0%;
                left: 50%;
                transform: translateX(-50%);
                background-color: #FFFFFF;
                padding: 0;
                margin: 0;
                border: none;
                width: 90%;
                aspect-ratio: 16/9;
                z-index: -1;
            }

            .background-container {
                position: absolute;
                top: 5%;
                background-image: url('images/kylelyn.png');
                background-position: center center;
                background-size: contain;
                background-repeat: no-repeat;
                width: 100%;
                height: 70vh;
                margin: 0;
                z-index: -1;
            }

            #invitedtext {
                top: 10%;
                text-align: center;
                width: 50%;
                margin-inline: auto;
                font-size: 4vh;
                margin-bottom: 0%;
                margin-top: 0.5%;
            }

            #rsvp-details {
                width: 50vw;
                margin: 0 auto;
                margin-left: 1%;
                z-index: 100;
            }
        }
    </style>
</head>
<body>
    <div class="background-container">
    </div>
    <p id="invitedtext">Kyle & Lyn</p>
    <p id="weddingdetails">We kindly invite you to our wedding. Here are the details . . . Lorem ipsum dolor sit amet, consectetur adipiscing elit. </p><form id="rsvp-details">
        <p> Kindly Respond </p>
        <label>Name</label><br>
        <input type="text" name="name"><br>
        <label>Number of Guests</label><br>
        <input type="text" name="guests"><br>
        <label>Email</label><br>
        <input type="text" name="email"><br><br>
        <button type="submit">Submit</button>
        <p id="responseMessage">-</p>
    </form>
    <iframe class="game"
            src="game/index.html">
    </iframe>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxEm31yzUd-to70GD4k910NY1RyoyefP7Re9xXRLu_EHTzDIvRgEWI9UklnD67SogKIlg/exec';
        const form = document.getElementById('rsvp-details');
        const responseMessage = document.getElementById('responseMessage');

        form.addEventListener('submit', e => {
            e.preventDefault(); // Stop default form redirect page behavior
            responseMessage.innerHTML = "Submitting...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form) })
                .then(response => {
                    responseMessage.innerHTML = "Info received!";
                    form.reset();
                })
                .catch(error => {
                    responseMessage.innerHTML = "An error occurred. Please try again or contact us directly.";
                    console.error('Error!', error.message);
                });
        });
    </script>
</body>
</html>
